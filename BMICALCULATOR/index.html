<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="../css/style2.css">
</head>
<body>
    <div id="container">
        <h2>BMI Calculator</h2>
        <form>
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" step="any" min="1" placeholder="e.g. 65" required>

            <label for="height">Height (cm): <small>(Enter in centimeters)</small></label>
            <input type="number" id="height" step="any" min="1" placeholder="e.g. 175" required>

            <button type="button" onclick="calculateBMI()">Calculate BMI</button>
        </form>
        <div id="result"></div>
        <div id="suggestion"></div>
    </div>
    <script src="bmi.js"></script>
</body>
</html>
